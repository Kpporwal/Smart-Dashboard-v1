<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Crypto Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-5 text-gray-800">Bitcoin Price (Last 7 Days)</h1>
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <canvas id="cryptoChart"></canvas>
        </div>
    </div>

    <script>
        async function fetchCryptoData() {
            // CoinGecko API for Bitcoin price history
            const url = 'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7';
            const response = await fetch(url);
            const data = await response.json();
            
            // Extracting prices and dates
            const prices = data.prices.map(item => item[1]);
            const labels = data.prices.map(item => new Date(item[0]).toLocaleDateString());

            const ctx = document.getElementById('cryptoChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Bitcoin Price (USD)',
                        data: prices,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1
                    }]
                }
            });
        }

        fetchCryptoData();
    </script>
</body>
</html>
