<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CryptoTracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body id="body" class="bg-gray-950 text-white min-h-screen flex flex-col items-center py-10 transition-colors duration-500">
    
    <button onclick="toggleTheme()" class="absolute top-5 right-5 bg-gray-800 p-2 rounded-full">🌙/☀️</button>

    <h1 class="text-5xl font-extrabold mb-2 text-blue-400">CryptoTracker Pro</h1>
    
    <div class="text-lg text-gray-400 mb-8">
        Price: <span id="price-display" class="font-bold text-blue-400">$...</span>
        <span id="change-display" class="ml-2 font-semibold"></span>
    </div>

    <div class="flex space-x-4 mb-10">
        <select id="coin-filter" onchange="refreshDashboard()" class="bg-gray-800 text-white px-6 py-3 rounded-lg border border-gray-700 outline-none">
            <option value="bitcoin">Bitcoin</option>
            <option value="ethereum">Ethereum</option>
            <option value="solana">Solana</option>
        </select>
        
        <select id="days-filter" onchange="refreshDashboard()" class="bg-gray-800 text-white px-6 py-3 rounded-lg border border-gray-700 outline-none">
            <option value="7">Last 7 Days</option>
            <option value="30">Last 1 Month</option>
            <option value="365">Last 1 Year</option>
        </select>
    </div>

    <div class="w-full max-w-5xl bg-gray-900 p-8 rounded-3xl shadow-2xl border border-gray-800">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let myChart;
        const ctx = document.getElementById('myChart').getContext('2d');

        function toggleTheme() {
            document.getElementById('body').classList.toggle('bg-gray-950');
            document.getElementById('body').classList.toggle('bg-white');
            document.getElementById('body').classList.toggle('text-black');
        }

        async function updateChart(days, coin) {
            document.getElementById('price-display').innerText = "Loading...";
            
            const url = `https://api.coingecko.com/api/v3/coins/${coin}/market_chart?vs_currency=usd&days=${days}`;
            const response = await fetch(url);
            const data = await response.json();
            
            const prices = data.prices.map(p => p[1]);
            const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString());

            myChart.data.labels = labels;
            myChart.data.datasets[0].data = prices;
            myChart.update();

            const currentPrice = prices[prices.length - 1];
            document.getElementById('price-display').innerText = `$${currentPrice.toLocaleString()}`;
            
            // Simple logic for price change
            const startPrice = prices[0];
            const change = ((currentPrice - startPrice) / startPrice) * 100;
            const changeDisplay = document.getElementById('change-display');
            changeDisplay.innerText = `${change.toFixed(2)}%`;
            changeDisplay.className = change >= 0 ? "text-green-500" : "text-red-500";
        }

        function refreshDashboard() {
            updateChart(document.getElementById('days-filter').value, document.getElementById('coin-filter').value);
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.4, fill: true }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        refreshDashboard();
    </script>
</body>
</html>
